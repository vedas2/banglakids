<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাংলাকিডস</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(160deg, #e0f7fa 0%, #b2ebf2 50%, #e8f5e9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            user-select: none;
        }

        .home-container {
            max-width: 400px;
            width: 100%;
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Header --- */
        .app-header { text-align: center; margin-bottom: 44px; }

        .app-logo { font-size: 4.5rem; margin-bottom: 12px; }

        .app-title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ff6b6b;
            letter-spacing: 1px;
        }

        .app-subtitle {
            font-size: 1rem;
            color: #888;
            margin-top: 6px;
        }

        /* --- Cards --- */
        .cards-grid { display: flex; flex-direction: column; gap: 18px; }

        .game-card {
            background: white;
            border-radius: 24px;
            padding: 28px 22px;
            display: flex;
            align-items: center;
            gap: 18px;
            text-decoration: none;
            box-shadow: 0 6px 24px rgba(0,0,0,0.09);
            transition: transform 0.12s, box-shadow 0.12s;
            cursor: pointer;
            border-bottom: 6px solid transparent;
        }
        .game-card:active {
            transform: translateY(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
        }

        .game-card.vowels     { border-bottom-color: #ff6b6b; }
        .game-card.consonants { border-bottom-color: #4ecdc4; }
        .game-card.words      { border-bottom-color: #ab47bc; }
        .game-card.words2     { border-bottom-color: #ff9800; }
        .game-card.words3     { border-bottom-color: #ec407a; }

        .card-letter {
            font-size: 3.8rem;
            width: 78px;
            height: 78px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .vowels     .card-letter { background: #fff0f0; }
        .consonants .card-letter { background: #f0fffe; }
        .words      .card-letter { background: #f3e5f5; }
        .words2     .card-letter { background: #fff3e0; }
        .words3     .card-letter { background: #fce4ec; }

        .card-info { flex: 1; }

        .card-title {
            font-size: 1.55rem;
            font-weight: bold;
            color: #333;
        }

        .card-title-en {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 3px;
        }

        .card-badge {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 20px;
        }
        .vowels     .card-badge { background: #fff0f0; color: #ff6b6b; }
        .consonants .card-badge { background: #f0fffe; color: #4ecdc4; }
        .words      .card-badge { background: #f3e5f5; color: #ab47bc; }
        .words2     .card-badge { background: #fff3e0; color: #ff9800; }
        .words3     .card-badge { background: #fce4ec; color: #ec407a; }

        .card-arrow { font-size: 1.4rem; color: #ddd; }

        /* --- Footer --- */
        .footer {
            text-align: center;
            margin-top: 44px;
            color: #bbb;
            font-size: 0.85rem;
        }

    /* --- Row Grid for Sub-modules --- */
    .row-grid { display: flex; gap: 18px; }
    .row-grid .game-card {
        flex: 1;
        flex-direction: column;
        text-align: center;
        padding: 22px 10px;
        gap: 12px;
    }
    .row-grid .card-letter {
        width: 65px; height: 65px; font-size: 1.8rem;
    }
    .row-grid .card-title { font-size: 1.3rem; }
    .row-grid .card-title-en { font-size: 0.8rem; }
    .row-grid .card-badge { margin-top: 6px; }
    .row-grid .card-arrow { display: none; }
    </style>
</head>
<body>

<div class="home-container">
    <div class="app-header">
        <div class="app-logo">📚</div>
        <div class="app-title">বাংলাকিডস</div>
        <div class="app-subtitle">Learn Bangla Alphabets — Pick a module!</div>
    </div>

    <div class="cards-grid">
        <a href="games/vowels.html" class="game-card vowels">
            <div class="card-letter">অ</div>
            <div class="card-info">
                <div class="card-title">স্বরবর্ণ</div>
                <div class="card-title-en">Vowels</div>
                <div class="card-badge">11 Letters</div>
            </div>
            <div class="card-arrow">➜</div>
        </a>

        <a href="games/consonants.html" class="game-card consonants">
            <div class="card-letter">ক</div>
            <div class="card-info">
                <div class="card-title">ব্যঞ্জনবর্ণ</div>
                <div class="card-title-en">Consonants</div>
                <div class="card-badge">30 Letters</div>
            </div>
            <div class="card-arrow">➜</div>
        </a>

        <div class="row-grid">
            <a href="games/group1-game.html" class="game-card words">
                <div class="card-letter">ক-ঙ</div>
                <div class="card-info">
                    <div class="card-title">শব্দ ১</div>
                    <div class="card-title-en">Group 1 Words</div>
                    <div class="card-badge">15 Words</div>
                </div>
            </a>

            <a href="games/group2-game.html" class="game-card words2">
                <div class="card-letter">চ-ঞ</div>
                <div class="card-info">
                    <div class="card-title">শব্দ ২</div>
                    <div class="card-title-en">Group 2 Words</div>
                    <div class="card-badge">15 Words</div>
                </div>
            </a>
        </div>

        <div class="row-grid">
            <a href="games/group3-game.html" class="game-card words3">
                <div class="card-letter">ট-ণ</div>
                <div class="card-info">
                    <div class="card-title">শব্দ ৩</div>
                    <div class="card-title-en">Group 3 Words</div>
                    <div class="card-badge">15 Words</div>
                </div>
            </a>
            <!-- Placeholder to keep the grid aligned -->
            <div class="game-card" style="visibility: hidden;"></div>
        </div>
    </div>

    <div class="footer">Tap a card to start!</div>
</div>

</body>
</html>
